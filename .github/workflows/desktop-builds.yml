name: Desktop Builds

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/desktop-builds.yml"
      - "desktop/**"
      - "electron-builder.config.cjs"
      - "index.html"
      - "package-lock.json"
      - "package.json"
      - "public/**"
      - "scripts/**"
      - "server/**"
      - "shared/**"
      - "src/**"
      - "tsconfig.json"
      - "tsconfig.server.json"
      - "vite.config.ts"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: desktop-builds-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: Windows x64
            id: win-x64
            runner: windows-latest
            script: desktop:dist:win:x64
            branch: builds/win-x64
            publish_url_suffix: builds/win-x64/latest/nsis-web
          - name: Windows ARM64
            id: win-arm64
            runner: windows-latest
            script: desktop:dist:win:arm64
            branch: builds/win-arm64
            publish_url_suffix: builds/win-arm64/latest/nsis-web
          - name: macOS ARM64
            id: mac-arm64
            runner: macos-latest
            script: desktop:dist:mac:arm64
            branch: builds/mac-arm64
            publish_url_suffix: ""
          - name: Linux x64
            id: linux-x64
            runner: ubuntu-latest
            script: desktop:dist:linux:x64
            branch: builds/linux-x64
            publish_url_suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Restore Electron caches
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-${{ matrix.target.id }}-electron-${{ hashFiles('package-lock.json', 'package.json', 'electron-builder.config.cjs') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target.id }}-electron-
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Build target
        env:
          ROUTY_WINDOWS_PUBLISH_URL: ${{ matrix.target.publish_url_suffix != '' && format('https://raw.githubusercontent.com/{0}/refs/heads/{1}', github.repository, matrix.target.publish_url_suffix) || '' }}
        run: npm run ${{ matrix.target.script }}

      - name: Remove unpacked outputs
        shell: bash
        run: |
          set -euo pipefail
          find release -maxdepth 1 -type d -name '*-unpacked' -exec rm -rf {} +

      - name: Externalize Windows web package
        if: startsWith(matrix.target.id, 'win-')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_ID: ${{ matrix.target.id }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import fs from "node:fs/promises";
          import path from "node:path";
          import yaml from "js-yaml";

          const releaseDir = path.resolve("release");
          const packageJson = JSON.parse(await fs.readFile("package.json", "utf8"));
          const version = String(packageJson.version ?? "").trim();
          const targetId = String(process.env.TARGET_ID ?? "").trim();
          const repository = String(process.env.GITHUB_REPOSITORY ?? "").trim();
          const githubToken = String(process.env.GITHUB_TOKEN ?? "").trim();
          const githubSha = String(process.env.GITHUB_SHA ?? "").trim();
          const payloadTag = `desktop-payloads-v${version}`;
          const payloadReleaseName = `Desktop payloads v${version}`;

          if (!version || !targetId || !repository || !githubToken || !githubSha) {
            throw new Error("Missing required GitHub release metadata for Windows payload publish");
          }

          async function listFiles(rootDir) {
            const entries = await fs.readdir(rootDir, { withFileTypes: true });
            const files = [];

            for (const entry of entries) {
              const fullPath = path.join(rootDir, entry.name);

              if (entry.isDirectory()) {
                files.push(...(await listFiles(fullPath)));
                continue;
              }

              if (entry.isFile()) {
                files.push(fullPath);
              }
            }

            return files;
          }

          const releaseFiles = await listFiles(releaseDir);
          const payloadFiles = releaseFiles.filter((filePath) => filePath.endsWith(".7z"));

          if (payloadFiles.length === 0) {
            console.log("No Windows payload archive found, skipping external publish.");
            process.exit(0);
          }

          async function githubJson(url, init = {}) {
            const response = await fetch(url, {
              ...init,
              headers: {
                Accept: "application/vnd.github+json",
                Authorization: `Bearer ${githubToken}`,
                "User-Agent": "routy-desktop-builds",
                ...init.headers
              }
            });

            if (response.status === 404) {
              return null;
            }

            if (!response.ok) {
              throw new Error(`GitHub API ${response.status} ${response.statusText}: ${await response.text()}`);
            }

            return response.status === 204 ? null : response.json();
          }

          async function getOrCreateRelease() {
            const releaseUrl = `https://api.github.com/repos/${repository}/releases/tags/${payloadTag}`;
            const existing = await githubJson(releaseUrl);

            if (existing) {
              return existing;
            }

            const created = await githubJson(`https://api.github.com/repos/${repository}/releases`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                tag_name: payloadTag,
                target_commitish: githubSha,
                name: payloadReleaseName,
                body: "Large desktop payloads referenced by Windows web installers and auto-update metadata.",
                draft: false,
                prerelease: false,
                generate_release_notes: false
              })
            }).catch(async (error) => {
              if (!String(error.message).includes("422")) {
                throw error;
              }

              return githubJson(releaseUrl);
            });

            if (!created) {
              throw new Error(`Unable to resolve GitHub release ${payloadTag}`);
            }

            return created;
          }

          let release = await getOrCreateRelease();
          const uploadedAssets = new Map();

          for (const filePath of payloadFiles) {
            const fileName = path.basename(filePath);
            const fileBytes = await fs.readFile(filePath);
            const existingAsset = Array.isArray(release.assets)
              ? release.assets.find((asset) => asset?.name === fileName)
              : null;

            if (existingAsset?.id) {
              await githubJson(`https://api.github.com/repos/${repository}/releases/assets/${existingAsset.id}`, {
                method: "DELETE"
              });
            }

            const uploadBaseUrl = String(release.upload_url ?? "").replace(/\{.*$/, "");
            const uploadUrl = `${uploadBaseUrl}?name=${encodeURIComponent(fileName)}`;
            const uploadResponse = await fetch(uploadUrl, {
              method: "POST",
              headers: {
                Accept: "application/vnd.github+json",
                Authorization: `Bearer ${githubToken}`,
                "Content-Type": "application/octet-stream",
                "Content-Length": String(fileBytes.byteLength),
                "User-Agent": "routy-desktop-builds"
              },
              body: fileBytes
            });

            if (!uploadResponse.ok) {
              throw new Error(
                `GitHub upload ${uploadResponse.status} ${uploadResponse.statusText}: ${await uploadResponse.text()}`
              );
            }

            const uploadedAsset = await uploadResponse.json();
            uploadedAssets.set(fileName, String(uploadedAsset.browser_download_url ?? "").trim());
          }

          const yamlFiles = releaseFiles.filter((filePath) => filePath.endsWith(".yml"));

          for (const yamlPath of yamlFiles) {
            const parsed = yaml.load(await fs.readFile(yamlPath, "utf8"));

            if (!parsed || typeof parsed !== "object") {
              continue;
            }

            const document = parsed;
            const fileEntries = Array.isArray(document.files) ? document.files : [];

            for (const entry of fileEntries) {
              if (!entry || typeof entry !== "object") {
                continue;
              }

              const currentUrl = typeof entry.url === "string" ? entry.url.trim() : "";
              const externalUrl = uploadedAssets.get(path.basename(currentUrl));

              if (externalUrl) {
                entry.url = externalUrl;
              }
            }

            if (document.packages && typeof document.packages === "object") {
              for (const packageEntry of Object.values(document.packages)) {
                if (!packageEntry || typeof packageEntry !== "object") {
                  continue;
                }

                const currentPath = typeof packageEntry.path === "string" ? packageEntry.path.trim() : "";
                const externalUrl = uploadedAssets.get(path.basename(currentPath));

                if (externalUrl) {
                  packageEntry.path = externalUrl;
                }
              }
            }

            const deprecatedPath = typeof document.path === "string" ? document.path.trim() : "";
            const externalUrl = uploadedAssets.get(path.basename(deprecatedPath));

            if (externalUrl) {
              document.path = externalUrl;
            }

            await fs.writeFile(yamlPath, yaml.dump(document, { lineWidth: -1, noRefs: true }));
          }
          NODE

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target.id }}
          path: |
            release/*.exe
            release/*.7z
            release/*.yml
            release/*.blockmap
            release/*.dmg
            release/*.AppImage
            release/*.zip
          if-no-files-found: error

      - name: Publish build branch
        shell: bash
        env:
          TARGET_ID: ${{ matrix.target.id }}
          TARGET_BRANCH: ${{ matrix.target.branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          export PUBLISH_DIR="$publish_dir"

          python3 <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import shutil

          package_json = json.loads(pathlib.Path("package.json").read_text(encoding="utf-8"))

          release_dir = pathlib.Path("release")
          publish_dir = pathlib.Path(os.environ["PUBLISH_DIR"])
          max_chunk_size = 95 * 1024 * 1024

          publish_dir.mkdir(parents=True, exist_ok=True)

          metadata = {
              "target": os.environ["TARGET_ID"],
              "version": package_json["version"],
              "sourceBranch": os.environ["GITHUB_REF_NAME"],
              "sourceCommit": os.environ["GITHUB_SHA"],
              "workflowRunUrl": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "files": [],
          }

          def sha256_for(path: pathlib.Path) -> str:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()

          allowed_suffixes = {
              ".AppImage",
              ".7z",
              ".blockmap",
              ".dmg",
              ".exe",
              ".yml",
              ".zip",
          }

          def should_publish(path: pathlib.Path) -> bool:
              if not path.is_file():
                  return False
              if path.name == ".DS_Store":
                  return False
              if path.name.startswith("builder-debug"):
                  return False
              if os.environ["TARGET_ID"].startswith("win-") and path.suffix == ".7z":
                  return False
              if path.suffix not in allowed_suffixes:
                  return False
              return True

          for item in sorted(release_dir.rglob("*")):
              if not should_publish(item):
                  continue

              size = item.stat().st_size
              digest = sha256_for(item)
              relative_name = item.relative_to(release_dir).as_posix()

              if size <= max_chunk_size:
                  destination = publish_dir / relative_name
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(item, destination)
                  metadata["files"].append({
                      "name": relative_name,
                      "originalName": item.relative_to(release_dir).as_posix(),
                      "size": size,
                      "sha256": digest,
                      "split": False,
                  })
                  continue

              parts = []
              with item.open("rb") as source:
                  index = 0
                  while True:
                      chunk = source.read(max_chunk_size)
                      if not chunk:
                          break
                      part_name = f"{relative_name}.part-{index:03d}"
                      destination = publish_dir / part_name
                      destination.parent.mkdir(parents=True, exist_ok=True)
                      destination.write_bytes(chunk)
                      parts.append({
                          "name": part_name,
                          "size": len(chunk),
                      })
                      index += 1

              metadata["files"].append({
                  "name": relative_name,
                  "originalName": item.relative_to(release_dir).as_posix(),
                  "size": size,
                  "sha256": digest,
                  "split": True,
                  "parts": parts,
              })

          (publish_dir / "build-info.json").write_text(
              json.dumps(metadata, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          cat > "$publish_dir/README.md" <<EOF
          # ${TARGET_ID}

          Build output published from GitHub Actions.

          - Source branch: ${GITHUB_REF_NAME}
          - Source commit: ${GITHUB_SHA}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Some distributables may be split into `.part-000`, `.part-001`, ... files to stay below GitHub's 100 MiB per-file repository limit.
          See `build-info.json` for the exact manifest.
          EOF

          cat > "$publish_dir/assemble.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          python3 - <<'PY'
          import json
          import pathlib

          root = pathlib.Path(".")
          metadata = json.loads((root / "build-info.json").read_text(encoding="utf-8"))

          for entry in metadata["files"]:
              if not entry.get("split"):
                  continue

              destination = root / entry["name"]
              with destination.open("wb") as output:
                  for part in entry["parts"]:
                      output.write((root / part["name"]).read_bytes())

              print(f"assembled {destination}")
          PY
          EOF
          chmod +x "$publish_dir/assemble.sh"

          cat > "$publish_dir/assemble.ps1" <<'EOF'
          $metadata = Get-Content -Raw build-info.json | ConvertFrom-Json
          foreach ($entry in $metadata.files) {
            if (-not $entry.split) { continue }

            $destination = Join-Path (Get-Location) $entry.name
            if (Test-Path $destination) {
              Remove-Item $destination
            }

            $stream = [System.IO.File]::Open($destination, [System.IO.FileMode]::CreateNew)
            try {
              foreach ($part in $entry.parts) {
                $bytes = [System.IO.File]::ReadAllBytes((Join-Path (Get-Location) $part.name))
                $stream.Write($bytes, 0, $bytes.Length)
              }
            }
            finally {
              $stream.Dispose()
            }

            Write-Host "assembled $($entry.name)"
          }
          EOF

          repo_dir="$(mktemp -d)"
          remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          snapshot_dir="archives/${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"

          if git ls-remote --exit-code --heads "$remote_url" "$TARGET_BRANCH" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$TARGET_BRANCH" "$remote_url" "$repo_dir"
          else
            git init "$repo_dir"
            git -C "$repo_dir" checkout -b "$TARGET_BRANCH"
            git -C "$repo_dir" remote add origin "$remote_url"
          fi

          mkdir -p "$repo_dir/latest" "$repo_dir/$snapshot_dir"
          find "$repo_dir/latest" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          find "$repo_dir/$snapshot_dir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp -a "$publish_dir"/. "$repo_dir/latest/"
          cp -a "$publish_dir"/. "$repo_dir/$snapshot_dir/"

          cat > "$repo_dir/README.md" <<EOF
          # ${TARGET_ID}

          Published desktop builds from GitHub Actions.

          - Latest snapshot: \`latest/\`
          - Archived snapshots: \`archives/<run-number>-<commit>/\`
          - Current source branch: ${GITHUB_REF_NAME}
          - Current source commit: ${GITHUB_SHA}
          - Current workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Each successful publish updates \`latest/\` and also stores an immutable copy in \`${snapshot_dir}/\`.
          EOF

          cd "$repo_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "Publish ${TARGET_ID} build from ${GITHUB_SHA}"
          git push origin "HEAD:${TARGET_BRANCH}"
