name: Desktop Builds

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/desktop-builds.yml"
      - "desktop/**"
      - "electron-builder.json"
      - "index.html"
      - "package-lock.json"
      - "package.json"
      - "public/**"
      - "scripts/**"
      - "server/**"
      - "shared/**"
      - "src/**"
      - "tsconfig.json"
      - "tsconfig.server.json"
      - "vite.config.ts"

permissions:
  contents: write

concurrency:
  group: desktop-builds-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: Windows x64
            id: win-x64
            runner: windows-latest
            script: desktop:dist:win:x64
            branch: builds/win-x64
          - name: Windows ARM64
            id: win-arm64
            runner: windows-latest
            script: desktop:dist:win:arm64
            branch: builds/win-arm64
          - name: macOS ARM64
            id: mac-arm64
            runner: macos-latest
            script: desktop:dist:mac:arm64
            branch: builds/mac-arm64
          - name: Linux x64
            id: linux-x64
            runner: ubuntu-latest
            script: desktop:dist:linux:x64
            branch: builds/linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Restore Electron caches
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-${{ matrix.target.id }}-electron-${{ hashFiles('package-lock.json', 'package.json', 'electron-builder.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target.id }}-electron-
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Build target
        run: npm run ${{ matrix.target.script }}

      - name: Remove unpacked outputs
        shell: bash
        run: |
          set -euo pipefail
          find release -maxdepth 1 -type d -name '*-unpacked' -exec rm -rf {} +

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target.id }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.zip
          if-no-files-found: error

      - name: Publish build branch
        shell: bash
        env:
          TARGET_ID: ${{ matrix.target.id }}
          TARGET_BRANCH: ${{ matrix.target.branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          export PUBLISH_DIR="$publish_dir"

          python3 <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import shutil

          release_dir = pathlib.Path("release")
          publish_dir = pathlib.Path(os.environ["PUBLISH_DIR"])
          max_chunk_size = 95 * 1024 * 1024

          publish_dir.mkdir(parents=True, exist_ok=True)

          metadata = {
              "target": os.environ["TARGET_ID"],
              "sourceBranch": os.environ["GITHUB_REF_NAME"],
              "sourceCommit": os.environ["GITHUB_SHA"],
              "workflowRunUrl": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "files": [],
          }

          def sha256_for(path: pathlib.Path) -> str:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()

          allowed_suffixes = {
              ".AppImage",
              ".dmg",
              ".exe",
              ".zip",
          }

          def should_publish(path: pathlib.Path) -> bool:
              if not path.is_file():
                  return False
              if path.name == ".DS_Store":
                  return False
              if path.name.startswith("builder-debug"):
                  return False
              if path.suffix not in allowed_suffixes:
                  return False
              return True

          for item in sorted(release_dir.rglob("*")):
              if not should_publish(item):
                  continue

              size = item.stat().st_size
              digest = sha256_for(item)
              relative_name = item.relative_to(release_dir).as_posix().replace("/", "__")

              if size <= max_chunk_size:
                  destination = publish_dir / relative_name
                  shutil.copy2(item, destination)
                  metadata["files"].append({
                      "name": relative_name,
                      "originalName": item.relative_to(release_dir).as_posix(),
                      "size": size,
                      "sha256": digest,
                      "split": False,
                  })
                  continue

              parts = []
              with item.open("rb") as source:
                  index = 0
                  while True:
                      chunk = source.read(max_chunk_size)
                      if not chunk:
                          break
                      part_name = f"{relative_name}.part-{index:03d}"
                      (publish_dir / part_name).write_bytes(chunk)
                      parts.append({
                          "name": part_name,
                          "size": len(chunk),
                      })
                      index += 1

              metadata["files"].append({
                  "name": relative_name,
                  "originalName": item.relative_to(release_dir).as_posix(),
                  "size": size,
                  "sha256": digest,
                  "split": True,
                  "parts": parts,
              })

          (publish_dir / "build-info.json").write_text(
              json.dumps(metadata, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          cat > "$publish_dir/README.md" <<EOF
          # ${TARGET_ID}

          Build output published from GitHub Actions.

          - Source branch: ${GITHUB_REF_NAME}
          - Source commit: ${GITHUB_SHA}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Some distributables may be split into `.part-000`, `.part-001`, ... files to stay below GitHub's 100 MiB per-file repository limit.
          See `build-info.json` for the exact manifest.
          EOF

          cat > "$publish_dir/assemble.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          python3 - <<'PY'
          import json
          import pathlib

          root = pathlib.Path(".")
          metadata = json.loads((root / "build-info.json").read_text(encoding="utf-8"))

          for entry in metadata["files"]:
              if not entry.get("split"):
                  continue

              destination = root / entry["name"]
              with destination.open("wb") as output:
                  for part in entry["parts"]:
                      output.write((root / part["name"]).read_bytes())

              print(f"assembled {destination}")
          PY
          EOF
          chmod +x "$publish_dir/assemble.sh"

          cat > "$publish_dir/assemble.ps1" <<'EOF'
          $metadata = Get-Content -Raw build-info.json | ConvertFrom-Json
          foreach ($entry in $metadata.files) {
            if (-not $entry.split) { continue }

            $destination = Join-Path (Get-Location) $entry.name
            if (Test-Path $destination) {
              Remove-Item $destination
            }

            $stream = [System.IO.File]::Open($destination, [System.IO.FileMode]::CreateNew)
            try {
              foreach ($part in $entry.parts) {
                $bytes = [System.IO.File]::ReadAllBytes((Join-Path (Get-Location) $part.name))
                $stream.Write($bytes, 0, $bytes.Length)
              }
            }
            finally {
              $stream.Dispose()
            }

            Write-Host "assembled $($entry.name)"
          }
          EOF

          cd "$publish_dir"
          git init -b "$TARGET_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Build ${TARGET_ID} from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "HEAD:${TARGET_BRANCH}"
