name: Android Build

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/android-build.yml"
      - "android/**"
  pull_request:
    paths:
      - ".github/workflows/android-build.yml"
      - "android/**"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Determine Android version
        id: android_version
        shell: bash
        run: |
          set -euo pipefail

          version_name="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).androidAppVersion")"
          if [ -z "${version_name}" ] || [ "${version_name}" = "null" ]; then
            echo "androidAppVersion missing in package.json" >&2
            exit 1
          fi

          version_code="${GITHUB_RUN_NUMBER}"

          {
            echo "version_name=${version_name}"
            echo "version_code=${version_code}"
          } >> "$GITHUB_OUTPUT"

      - name: Build release APK and run unit tests
        env:
          ANDROID_VERSION_NAME: ${{ steps.android_version.outputs.version_name }}
          ANDROID_VERSION_CODE: ${{ steps.android_version.outputs.version_code }}
        run: >-
          gradle -p android --no-daemon
          :app:assembleRelease
          :app:testDebugUnitTest
          -PciBuild=true
          -PandroidAppVersion=${ANDROID_VERSION_NAME}
          -PversionCode=${ANDROID_VERSION_CODE}

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish build branch
        if: success() && github.event_name != 'pull_request'
        shell: bash
        env:
          ANDROID_VERSION_NAME: ${{ steps.android_version.outputs.version_name }}
          TARGET_BRANCH: builds/android-release
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          export PUBLISH_DIR="$publish_dir"

          python3 <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import shutil

          apk_dir = pathlib.Path("android/app/build/outputs/apk/release")
          publish_dir = pathlib.Path(os.environ["PUBLISH_DIR"])

          publish_dir.mkdir(parents=True, exist_ok=True)

          metadata = {
              "target": "android-release",
              "version": os.environ["ANDROID_VERSION_NAME"],
              "sourceBranch": os.environ["GITHUB_REF_NAME"],
              "sourceCommit": os.environ["GITHUB_SHA"],
              "workflowRunUrl": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "files": [],
          }

          def sha256_for(path: pathlib.Path) -> str:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()

          apk_files = sorted(apk_dir.glob("*.apk"))
          if not apk_files:
              raise SystemExit("No APK files found in release output directory")

          for item in apk_files:
              destination = publish_dir / item.name
              shutil.copy2(item, destination)
              metadata["files"].append({
                  "name": item.name,
                  "size": item.stat().st_size,
                  "sha256": sha256_for(item),
              })

          (publish_dir / "build-info.json").write_text(
              json.dumps(metadata, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          cat > "$publish_dir/README.md" <<EOF
          # android-release

          Android APK published from GitHub Actions.

          - Source branch: ${GITHUB_REF_NAME}
          - Source commit: ${GITHUB_SHA}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          See build-info.json for checksums and sizes.
          EOF

          repo_dir="$(mktemp -d)"
          remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          snapshot_dir="archives/${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"

          if git ls-remote --exit-code --heads "$remote_url" "$TARGET_BRANCH" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$TARGET_BRANCH" "$remote_url" "$repo_dir"
          else
            git init "$repo_dir"
            git -C "$repo_dir" checkout -b "$TARGET_BRANCH"
            git -C "$repo_dir" remote add origin "$remote_url"
          fi

          mkdir -p "$repo_dir/latest" "$repo_dir/$snapshot_dir"
          find "$repo_dir/latest" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          find "$repo_dir/$snapshot_dir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp -a "$publish_dir"/. "$repo_dir/latest/"
          cp -a "$publish_dir"/. "$repo_dir/$snapshot_dir/"

          cat > "$repo_dir/README.md" <<EOF
          # android-release

          Published Android builds from GitHub Actions.

          - Latest snapshot: \`latest/\`
          - Archived snapshots: \`archives/<run-number>-<commit>/\`
          - Current source branch: ${GITHUB_REF_NAME}
          - Current source commit: ${GITHUB_SHA}
          - Current workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Each successful publish updates \`latest/\` and also stores an immutable copy in \`${snapshot_dir}/\`.
          EOF

          cd "$repo_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "Publish android-release build from ${GITHUB_SHA}"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: android-build-reports
          path: |
            android/app/build/reports/**
            android/app/build/test-results/**
            android/app/build/outputs/mapping/release/**
          if-no-files-found: ignore
